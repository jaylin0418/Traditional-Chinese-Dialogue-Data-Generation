# ═══════════════════════════════════════════════════════════════════════════
# SYNTHETIC DIALOGUE GENERATION PIPELINE - VERSION 2 (DUAL LLM)
# ═══════════════════════════════════════════════════════════════════════════
# This configuration enables dual-LLM dialogue generation where two separate
# models interact to create natural conversations through turn-based exchange.
# ═══════════════════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════════════
# HYDRA CONFIGURATION - Disable outputs folder creation
# ═══════════════════════════════════════════════════════════════════════════
hydra:
  output_subdir: null  # Don't create .hydra subdirectory
  run:
    dir: .  # Run in current directory instead of creating outputs/YYYY-MM-DD/
  job:
    chdir: false  # Don't change working directory

device: cuda

# Per-run output root (leave null to auto-create syn_data_zh_{timestamp})
run_root: null

# Para-compatible output root (affects TTS output + HuggingFace export)
data_root: TEST_syn_data

# Dataset/output mode label (used as folder name under data_root; HF exported column `mode` is set by the exporter)
mode_name: normal

# Optional suffix appended to topic folder names (e.g. "_emo" for emotion runs). Does NOT affect LLM prompt topic text.
topic_folder_suffix: ""

# Batch runner defaults (counts are scenario counts, not dialogue turns)
batch_run:
  topic: ${scenario.topic}
  batch_size: ${scenario.n}
  total_count: ${scenario.n}
  final_huggingface_only: true

multi_topic_run:
  output_root_base: /work/jaylin0418
  workers: 2
  per_topic_count: 130
  batch_size: 10
  final_huggingface_only: true
  topics:
    - Art
    - Books
    - Cars
    - Celebrities
    - Coding
    - Cooking
    - Education
    - Events
    - Fashion
    - Fitness
    - Finance
    - Food
    - Gaming
    - Gardening
    - Health
    - History
    - Hobbies
    - Holidays
    - Home
    - Languages
    - Makeup
    - Movies
    - Music
    - Nature
    - News
    - Pets
    - Philosophy
    - Photography
    - Podcasts
    - Politics
    - Relationships
    - Science
    - Shopping
    - Social Media
    - Spirituality
    - Sports
    - Technology
    - Traditions
    - Travel
    - Weather
    - Work

# ═══════════════════════════════════════════════════════════════════════════
