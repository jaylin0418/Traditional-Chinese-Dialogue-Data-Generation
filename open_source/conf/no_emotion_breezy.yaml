# ═══════════════════════════════════════════════════════════════════════════
emotion:
  - afraid
  - amusement
  - angry
  - anxiety
  - calm
  - compassion
  - contentment
  - cry
  - disappointment
  - disgusted
  - envy
  - excitement
  - frustration
  - gratitude
  - grief
  - guilt
  - happy
  - hope
  - melancholic
  - pride
  - relief
  - sad
  - shame
  - surprised
  - sarcastic
  - hysteria

# ═══════════════════════════════════════════════════════════════════════════
